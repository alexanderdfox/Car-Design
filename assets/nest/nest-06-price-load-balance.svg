<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="system-ui, sans-serif">
  <title>Nest 06 - price_kw load balancing</title>
  <rect width="960" height="480" fill="#ffffff"/>
  <text x="24" y="32" font-size="18" font-weight="600">Load balancing via price pheromone</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Section 5 | distributed choice, not one optimizer</text>
  <rect x="80" y="80" width="800" height="36" fill="#f4f4f5" stroke="#d4d4d8" rx="4"/>
  <text x="100" y="102" font-size="11" font-family="monospace">price_kw[stall] = base_rate * (1 + 0.6 * utilization_15min) - solar_offset</text>
  <!-- bar chart stalls -->
  <text x="80" y="140" font-size="12" font-weight="600">Stall price_kw (agents prefer lower)</text>
  <g transform="translate(120,160)">
    <rect x="0" y="80" width="50" height="120" fill="#22c55e"/><text x="25" y="215" font-size="9" text-anchor="middle">S03</text>
    <rect x="70" y="40" width="50" height="160" fill="#eab308"/><text x="95" y="215" font-size="9" text-anchor="middle">S07</text>
    <rect x="140" y="100" width="50" height="100" fill="#22c55e"/><text x="165" y="215" font-size="9" text-anchor="middle">S12</text>
    <rect x="210" y="20" width="50" height="180" fill="#ef4444"/><text x="235" y="215" font-size="9" text-anchor="middle">S18</text>
    <text x="300" y="120" font-size="10" fill="#71717a">high util -&gt; high price -&gt; fewer agents</text>
  </g>
  <!-- V2G branch -->
  <g transform="translate(520,160)">
    <rect width="380" height="180" fill="#f0f9ff" stroke="#0ea5e9" rx="6"/>
    <text x="16" y="28" font-size="12" font-weight="600" fill="#0369a1">Night V2G (optional)</text>
    <text x="16" y="52" font-size="10">Only if agent v2g_opt_in = true locally</text>
    <text x="16" y="72" font-size="10">Stall writes export tariff trace</text>
    <text x="16" y="100" font-size="10" fill="#dc2626">NO fleet-wide discharge command</text>
    <path d="M40 120 L120 120 L120 150 L200 150" fill="none" stroke="#0ea5e9"/>
    <text x="210" y="154" font-size="9">per-agent branch</text>
  </g>
  <text x="24" y="460" font-size="9" fill="#a1a1aa">Bus &gt;90% cap: swap_ready down, price_kw up - agents read traces</text>
</svg>
