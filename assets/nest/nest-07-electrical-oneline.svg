<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="system-ui, sans-serif">
  <title>Nest 07 - electrical one-line</title>
  <rect width="1000" height="400" fill="#fafafa"/>
  <text x="24" y="32" font-size="18" font-weight="600">Electrical one-line (conceptual)</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Section 6 | 2.4 MVA | bus A odd / bus B even stalls</text>
  <!-- utility -->
  <circle cx="80" cy="200" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="80" y="205" font-size="9" text-anchor="middle">UTILITY</text>
  <text x="80" y="240" font-size="9" text-anchor="middle">2.4 MVA</text>
  <line x1="108" y1="200" x2="180" y2="200" stroke="#18181b" stroke-width="2"/>
  <!-- transformers -->
  <rect x="180" y="120" width="70" height="50" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="215" y="150" font-size="9" text-anchor="middle">T1 1.2MVA</text>
  <rect x="180" y="230" width="70" height="50" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="215" y="260" font-size="9" text-anchor="middle">T2 1.2MVA</text>
  <line x1="250" y1="145" x2="320" y2="145" stroke="#18181b" stroke-width="2"/>
  <line x1="250" y1="255" x2="320" y2="255" stroke="#18181b" stroke-width="2"/>
  <!-- buses -->
  <line x1="320" y1="100" x2="320" y2="190" stroke="#4338ca" stroke-width="4"/>
  <text x="330" y="150" font-size="11" fill="#4338ca">Bus A</text>
  <line x1="320" y1="210" x2="320" y2="300" stroke="#7c3aed" stroke-width="4"/>
  <text x="330" y="260" font-size="11" fill="#7c3aed">Bus B</text>
  <!-- stalls odd on A -->
  <g transform="translate(340,80)">
    <line x1="0" y1="65" x2="40" y2="65" stroke="#4338ca"/>
    <rect x="40" y="50" width="100" height="30" fill="#fff" stroke="#f97316"/>
    <text x="90" y="70" font-size="9" text-anchor="middle">S01,S03.. 150kW DC</text>
    <text x="200" y="70" font-size="9" fill="#71717a">+ 12 kW swap</text>
  </g>
  <g transform="translate(340,120)">
    <line x1="0" y1="25" x2="40" y2="25" stroke="#4338ca"/>
    <rect x="40" y="10" width="100" height="30" fill="#fff" stroke="#f97316"/>
    <text x="90" y="30" font-size="9" text-anchor="middle">odd stalls...</text>
  </g>
  <!-- stalls even on B -->
  <g transform="translate(340,220)">
    <line x1="0" y1="65" x2="40" y2="65" stroke="#7c3aed"/>
    <rect x="40" y="50" width="100" height="30" fill="#fff" stroke="#f97316"/>
    <text x="90" y="70" font-size="9" text-anchor="middle">S02,S04.. 150kW DC</text>
  </g>
  <!-- kW cap note -->
  <rect x="600" y="120" width="360" height="160" fill="#fff7ed" stroke="#f97316" rx="6"/>
  <text x="620" y="148" font-size="12" font-weight="600">kW_cap enforcement</text>
  <text x="620" y="172" font-size="10">When bus &gt; 90% cap:</text>
  <text x="620" y="192" font-size="10">- swap_ready = false on trace</text>
  <text x="620" y="212" font-size="10">- price_kw raised on trace</text>
  <text x="620" y="240" font-size="10" fill="#16a34a">Agents read map - NOT broadcast throttle</text>
  <text x="620" y="262" font-size="9" fill="#71717a">Planning cap 1.56 MVA (diversity 0.65)</text>
  <text x="24" y="380" font-size="9" fill="#a1a1aa">Excluded: queen substation branding, hive core reactor metaphor</text>
</svg>
