<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="system-ui, sans-serif">
  <title>Nest 04 - local allocation flow</title>
  <rect width="1000" height="560" fill="#fafafa"/>
  <text x="24" y="32" font-size="18" font-weight="600">Local stall allocation (every agent, identical)</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Section 3.1 | no global sort of 40 queues</text>
  <defs>
    <g id="box"><rect width="180" height="44" rx="6" fill="#fff" stroke="#18181b" stroke-width="1.5"/></g>
  </defs>
  <g font-size="10" text-anchor="middle">
    <g transform="translate(410,70)"><use href="#box"/><text x="90" y="28">seeking_nest (SOC &lt; SOC_min)</text></g>
    <line x1="500" y1="114" x2="500" y2="130" stroke="#18181b" marker-end="url(#a)"/>
    <g transform="translate(410,130)"><use href="#box"/><text x="90" y="28">READ stalls in horizon H</text></g>
    <line x1="500" y1="174" x2="500" y2="190" stroke="#18181b" marker-end="url(#a)"/>
    <g transform="translate(360,190)"><use href="#box" width="280"/><text x="140" y="28">cost = wait + price_kw*kWh + distance; INF if reserved</text></g>
    <line x1="500" y1="234" x2="500" y2="250" stroke="#18181b" marker-end="url(#a)"/>
    <g transform="translate(410,250)"><use href="#box"/><text x="90" y="28">PICK s* via softmax(-cost)</text></g>
    <line x1="500" y1="294" x2="500" y2="310" stroke="#18181b" marker-end="url(#a)"/>
    <g transform="translate(390,310)"><use href="#box" width="220"/><text x="110" y="28">WRITE reserved_until (+12 min)</text></g>
    <line x1="500" y1="354" x2="500" y2="370" stroke="#18181b" marker-end="url(#a)"/>
    <g transform="translate(400,370)"><use href="#box" width="200"/><text x="100" y="28">DRIVE UWB + rear camera</text></g>
    <line x1="500" y1="414" x2="500" y2="430" stroke="#18181b" marker-end="url(#a)"/>
    <g transform="translate(390,430)"><use href="#box" width="220"/><text x="110" y="28">Arrive: consume swap_ready; clear on exit</text></g>
  </g>
  <rect x="720" y="130" width="250" height="200" fill="#fef2f2" stroke="#ef4444" rx="6"/>
  <text x="740" y="158" font-size="12" font-weight="600" fill="#991b1b">BEE MODE (reject)</text>
  <text x="740" y="182" font-size="10" fill="#7f1d1d">Central service re-sorts</text>
  <text x="740" y="198" font-size="10" fill="#7f1d1d">all 40 queues each second</text>
  <text x="740" y="214" font-size="10" fill="#7f1d1d">and pushes slot IDs to cars</text>
  <defs><marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#18181b"/></marker></defs>
  <text x="24" y="540" font-size="9" fill="#a1a1aa">T_hold default 12 min | commit_threshold probabilistic</text>
</svg>
