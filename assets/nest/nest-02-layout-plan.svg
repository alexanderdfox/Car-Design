<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="system-ui, sans-serif">
  <title>Nest 02 - layout plan (40 stalls)</title>
  <defs>
    <g id="stall"><rect width="44" height="58" fill="#fff" stroke="#f97316" stroke-width="1.5"/><text x="6" y="34" font-size="8" fill="#3f3f46"/></g>
  </defs>
  <rect width="1000" height="640" fill="#fafafa"/>
  <text x="24" y="32" font-size="18" font-weight="600">Nest layout plan - 40 stalls</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Section 2 | ingress/egress UWB | no dispatcher logic</text>
  <!-- street top -->
  <rect x="80" y="70" width="840" height="36" fill="#71717a"/>
  <text x="500" y="92" font-size="11" fill="#fff" text-anchor="middle">STREET - street_queue_pheromone spillback</text>
  <circle cx="200" cy="88" r="6" fill="#38bdf8"/><text x="188" y="108" font-size="9" fill="#0369a1">ingress UWB</text>
  <circle cx="800" cy="88" r="6" fill="#38bdf8"/><text x="778" y="108" font-size="9" fill="#0369a1">ingress UWB</text>
  <!-- yard -->
  <rect x="80" y="110" width="840" height="460" fill="#e4e4e7" stroke="#18181b" stroke-width="2" rx="4"/>
  <rect x="100" y="125" width="800" height="42" fill="#fff7ed" stroke="#f97316" stroke-dasharray="5 3"/>
  <text x="500" y="150" font-size="11" text-anchor="middle">BUFFER LANE (slow pass, no stops)</text>
  <!-- Row A S01-S20 -->
  <text x="100" y="188" font-size="11" font-weight="600">Row A - swap lifts</text>
  <g transform="translate(100,195)">
    <g id="rowA">
      <!-- 10 visible + ellipsis pattern -->
      <use href="#stall" x="0" y="0"/><text x="10" y="34" font-size="8">S01</text>
      <use href="#stall" x="50" y="0"/><text x="60" y="34" font-size="8">S02</text>
      <use href="#stall" x="100" y="0"/><text x="110" y="34" font-size="8">S03</text>
      <use href="#stall" x="150" y="0"/><text x="160" y="34" font-size="8">S04</text>
      <use href="#stall" x="200" y="0"/><text x="210" y="34" font-size="8">S05</text>
      <use href="#stall" x="250" y="0"/><text x="258" y="34" font-size="8">S06</text>
      <use href="#stall" x="300" y="0"/><text x="308" y="34" font-size="8">S07</text>
      <use href="#stall" x="350" y="0"/><text x="358" y="34" font-size="8">S08</text>
      <use href="#stall" x="400" y="0"/><text x="408" y="34" font-size="8">S09</text>
      <use href="#stall" x="450" y="0"/><text x="456" y="34" font-size="8">S10</text>
      <text x="520" y="34" font-size="11" fill="#71717a">... S11-S20</text>
    </g>
  </g>
  <!-- Row B S21-S40 -->
  <text x="100" y="290" font-size="11" font-weight="600">Row B</text>
  <g transform="translate(100,298)">
    <use href="#stall" x="0" y="0"/><text x="8" y="34" font-size="8">S21</text>
    <use href="#stall" x="50" y="0"/><text x="56" y="34" font-size="8">S22</text>
    <use href="#stall" x="100" y="0"/><text x="106" y="34" font-size="8">S23</text>
    <use href="#stall" x="150" y="0"/><text x="156" y="34" font-size="8">S24</text>
    <text x="220" y="34" font-size="11" fill="#71717a">... S25-S40</text>
  </g>
  <rect x="100" y="380" width="800" height="55" fill="#a1a1aa" stroke="#52525b"/>
  <text x="500" y="412" font-size="11" text-anchor="middle">CCS overflow pads (slow charge)</text>
  <rect x="100" y="445" width="800" height="55" fill="#d4d4d8" stroke="#52525b"/>
  <text x="500" y="477" font-size="11" text-anchor="middle">Cassette storage (charged / empty)</text>
  <!-- street bottom -->
  <rect x="80" y="578" width="840" height="36" fill="#71717a"/>
  <text x="500" y="600" font-size="11" fill="#fff" text-anchor="middle">STREET</text>
  <circle cx="200" cy="596" r="6" fill="#38bdf8"/><text x="188" y="628" font-size="9" fill="#0369a1">egress UWB</text>
  <circle cx="800" cy="596" r="6" fill="#38bdf8"/><text x="778" y="628" font-size="9" fill="#0369a1">egress UWB</text>
  <text x="24" y="630" font-size="9" fill="#a1a1aa">Human operator: nest capacity only - not per-vehicle routes</text>
</svg>
