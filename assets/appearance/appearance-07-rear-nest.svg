<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" font-family="system-ui, sans-serif">
  <title>Appearance 07 - rear nest return interface</title>
  <rect width="560" height="480" fill="#fafafa"/>
  <text x="24" y="32" font-size="18" font-weight="600">Rear - nest return (not a stinger)</text>
  <text x="24" y="52" font-size="11" fill="#71717a">CCS | charge LED | agent QR | pantograph pocket hint</text>
  <!-- rear elevation -->
  <rect x="80" y="80" width="400" height="280" fill="#f4f4f5" stroke="#18181b" stroke-width="2" rx="4"/>
  <rect x="120" y="120" width="320" height="140" fill="#e4e4e7" stroke="#a1a1aa"/>
  <!-- doors -->
  <line x1="280" y1="120" x2="280" y2="260" stroke="#d4d4d8" stroke-width="2"/>
  <!-- CCS -->
  <rect x="248" y="200" width="64" height="48" fill="#f97316" stroke="#18181b" rx="4"/>
  <text x="280" y="228" font-size="9" text-anchor="middle" fill="#fff">CCS</text>
  <!-- LED strip -->
  <rect x="160" y="270" width="240" height="12" rx="2" fill="#3f3f46"/>
  <rect x="160" y="270" width="120" height="12" rx="2" fill="#22c55e"/>
  <rect x="280" y="270" width="120" height="12" rx="2" fill="#f59e0b"/>
  <text x="280" y="295" font-size="9" text-anchor="middle">charge state LED only (green/amber)</text>
  <!-- QR -->
  <rect x="360" y="140" width="48" height="48" fill="#fff" stroke="#18181b"/>
  <text x="384" y="170" font-size="8" text-anchor="middle">agent ID</text>
  <!-- bumper orange -->
  <rect x="78" y="350" width="404" height="14" fill="#f97316"/>
  <text x="280" y="380" font-size="10" text-anchor="middle">orange bumper accent - not stinger shape</text>
  <!-- underbody pantograph hint -->
  <rect x="200" y="355" width="160" height="20" fill="none" stroke="#6366f1" stroke-dasharray="4 2"/>
  <text x="280" y="410" font-size="9" text-anchor="middle" fill="#4f46e5">pantograph pocket (nest only)</text>
  <text x="24" y="460" font-size="9" fill="#a1a1aa">Depot-scale interface | no heroic crown on roof</text>
</svg>
