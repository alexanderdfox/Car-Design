<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="system-ui, sans-serif">
  <title>Appearance 08 - materials and mood board</title>
  <rect width="880" height="360" fill="#f4f4f5"/>
  <text x="24" y="32" font-size="18" font-weight="600">Materials, light, mood</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Trustworthy utility | near-future logistics | NOT hive cathedral</text>
  <!-- swatches -->
  <g transform="translate(24,80)">
    <rect width="100" height="80" fill="#fafafa" stroke="#d4d4d8"/><text x="50" y="100" font-size="9" text-anchor="middle">matte white</text>
    <rect x="120" width="100" height="80" fill="#e4e4e7" stroke="#d4d4d8"/><text x="170" y="100" font-size="9" text-anchor="middle">light gray</text>
    <rect x="240" width="100" height="80" fill="#18181b"/><text x="290" y="100" font-size="9" text-anchor="middle" fill="#fff">sensor black</text>
    <rect x="360" width="100" height="80" fill="#f97316"/><text x="410" y="100" font-size="9" text-anchor="middle">safety orange</text>
    <rect x="480" width="100" height="80" fill="#a1a1aa"/><text x="530" y="100" font-size="9" text-anchor="middle">zinc cassette</text>
  </g>
  <!-- lighting diagram -->
  <g transform="translate(24,200)">
    <rect width="400" height="120" fill="#fff" stroke="#d4d4d8" rx="6"/>
    <ellipse cx="200" cy="20" rx="80" ry="12" fill="#fef9c3" opacity="0.8"/>
    <text x="200" y="24" font-size="9" text-anchor="middle">soft overhead studio</text>
    <rect x="120" y="50" width="160" height="50" fill="#fafafa" stroke="#18181b"/>
    <ellipse cx="200" cy="115" rx="100" ry="8" fill="#00000010"/>
    <text x="200" y="95" font-size="9" text-anchor="middle">neutral floor / urban ground line</text>
  </g>
  <!-- mood words -->
  <g transform="translate(460,200)" font-size="11">
    <rect width="380" height="120" fill="#fff" stroke="#d4d4d8" rx="6"/>
    <text x="16" y="28" font-weight="600">Mood</text>
    <text x="16" y="50" fill="#166534">+ grounded, European urban, honest modules</text>
    <text x="16" y="72" fill="#166534">+ quiet electric utility, peer among equals</text>
    <text x="16" y="94" fill="#dc2626">- hive cathedral, cute bug face, honey branding</text>
    <text x="16" y="116" fill="#dc2626">- sci-fi swarm poster, monster insect truck</text>
  </g>
  <text x="24" y="340" font-size="9" fill="#a1a1aa">Hex #f97316 range for bumpers and door edges</text>
</svg>
