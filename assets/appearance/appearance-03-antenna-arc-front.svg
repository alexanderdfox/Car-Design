<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="system-ui, sans-serif">
  <title>Appearance 03 - front sensor antenna arc</title>
  <rect width="640" height="520" fill="#f8fafc"/>
  <text x="24" y="32" font-size="18" font-weight="600">Front view - sensor antennae (not mandibles)</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Wide arc 270-300 deg | LiDAR ~400 mm | cameras ~1350 mm</text>
  <!-- van front -->
  <rect x="120" y="180" width="400" height="220" fill="#fafafa" stroke="#18181b" stroke-width="2" rx="8"/>
  <rect x="200" y="200" width="240" height="100" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="320" y="255" font-size="11" text-anchor="middle" fill="#0369a1">windshield</text>
  <!-- pillars -->
  <rect x="155" y="120" width="44" height="90" rx="6" fill="#18181b" stroke="#f97316" stroke-width="2"/>
  <rect x="441" y="120" width="44" height="90" rx="6" fill="#18181b" stroke="#f97316" stroke-width="2"/>
  <circle cx="177" cy="200" r="10" fill="#38bdf8"/><circle cx="463" cy="200" r="10" fill="#38bdf8"/>
  <text x="177" y="115" font-size="8" text-anchor="middle">camera</text>
  <text x="463" y="115" font-size="8" text-anchor="middle">camera</text>
  <!-- arc -->
  <path d="M177 210 Q320 60 463 210" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="320" y="48" font-size="11" text-anchor="middle" fill="#ea580c">perception arc</text>
  <!-- bumper LiDAR -->
  <rect x="280" y="380" width="80" height="24" rx="4" fill="#27272a" stroke="#f97316"/>
  <text x="320" y="420" font-size="10" text-anchor="middle">bumper LiDAR</text>
  <!-- flat BEV front - no grille -->
  <rect x="140" y="400" width="360" height="20" fill="#e4e4e7"/>
  <text x="320" y="455" font-size="10" text-anchor="middle" fill="#16a34a">flat front - no ICE grille, no exhaust</text>
  <!-- avoid overlay -->
  <g transform="translate(24,460)" opacity="0.9">
    <text x="0" y="0" font-size="9" fill="#dc2626">X not whiskers X not legs X not bug eyes</text>
  </g>
</svg>
