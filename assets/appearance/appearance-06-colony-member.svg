<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="system-ui, sans-serif">
  <title>Appearance 06 - identical colony members</title>
  <defs>
    <g id="van">
      <rect x="0" y="20" width="120" height="50" fill="#fafafa" stroke="#18181b"/>
      <path d="M0 20 L0 0 L35 -15 L42 20 Z" fill="#e4e4e7" stroke="#18181b"/>
      <rect x="8" y="2" width="18" height="22" fill="#18181b" stroke="#f97316"/>
      <rect x="38" y="0" width="18" height="24" fill="#18181b" stroke="#f97316"/>
      <circle cx="28" cy="70" r="14" fill="#3f3f46"/><circle cx="92" cy="70" r="14" fill="#3f3f46"/>
      <rect x="-2" y="45" width="4" height="12" fill="#f97316"/>
    </g>
  </defs>
  <rect width="960" height="400" fill="#f4f4f5"/>
  <text x="24" y="32" font-size="18" font-weight="600">Colony member - every unit identical</text>
  <text x="24" y="52" font-size="11" fill="#71717a">No queen variant | no gold leader | no command mast</text>
  <use href="#van" x="120" y="120"/>
  <use href="#van" x="320" y="125"/>
  <use href="#van" x="520" y="118"/>
  <text x="180" y="230" font-size="10" text-anchor="middle">Agent M-07</text>
  <text x="380" y="235" font-size="10" text-anchor="middle">Agent M-19</text>
  <text x="580" y="228" font-size="10" text-anchor="middle">Agent M-33</text>
  <text x="480" y="260" font-size="11" text-anchor="middle" fill="#52525b">same cab, sensors, cargo, paint - not formation flight</text>
  <!-- forbidden comparison ghost -->
  <g transform="translate(700,100)" opacity="0.35">
    <rect width="200" height="120" fill="#fef3c7" stroke="#eab308" stroke-dasharray="6 3" rx="6"/>
    <text x="100" y="50" font-size="11" text-anchor="middle" fill="#a16207">QUEEN (reject)</text>
    <text x="100" y="70" font-size="9" text-anchor="middle">larger cab, gold trim</text>
  </g>
  <text x="700" y="240" font-size="10" fill="#dc2626">X do not ship this variant</text>
  <line x1="120" y1="280" x2="640" y2="280" stroke="#a1a1aa"/>
  <text x="24" y="370" font-size="9" fill="#71717a">LED strips independent per vehicle - not synchronized swarm pulse</text>
</svg>
