<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="system-ui, sans-serif">
  <title>Appearance 02 - segmented body modules</title>
  <rect width="960" height="420" fill="#ffffff"/>
  <text x="24" y="32" font-size="18" font-weight="600">Segmented body - three modules on one skid</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Ant trait: segmented body | honest panel gaps, not one melted blob</text>
  <!-- skid base -->
  <rect x="80" y="280" width="800" height="28" fill="#a1a1aa" stroke="#52525b" stroke-width="2" rx="2"/>
  <text x="480" y="275" font-size="10" text-anchor="middle" fill="#52525b">flat aluminum skid + ISO-like rail slots</text>
  <!-- exploded modules -->
  <g transform="translate(100,120)">
    <rect width="200" height="140" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="4"/>
    <path d="M0 140 L0 40 L80 0 L100 140 Z" fill="#bfdbfe"/>
    <text x="100" y="80" font-size="12" font-weight="600" text-anchor="middle">1. Cab module</text>
    <text x="100" y="100" font-size="9" text-anchor="middle" fill="#52525b">cab-over forward control</text>
  </g>
  <g transform="translate(340,100)">
    <rect width="280" height="160" fill="#f4f4f5" stroke="#18181b" stroke-width="2" rx="4"/>
    <rect x="220" y="20" width="14" height="120" fill="#f97316"/>
    <text x="140" y="85" font-size="12" font-weight="600" text-anchor="middle">2. Cargo box</text>
    <text x="140" y="105" font-size="9" text-anchor="middle" fill="#52525b">4.2 m3 | roller door</text>
  </g>
  <g transform="translate(660,200)">
    <rect width="220" height="70" fill="#d4d4d8" stroke="#71717a" stroke-width="2" rx="3"/>
    <text x="110" y="40" font-size="12" font-weight="600" text-anchor="middle">3. Battery cassette</text>
    <text x="110" y="58" font-size="9" text-anchor="middle" fill="#52525b">slide-under swap pack</text>
  </g>
  <!-- gap arrows -->
  <path d="M300 190 L330 190" stroke="#f97316" marker-end="url(#ar)"/>
  <path d="M620 190 L650 190" stroke="#f97316" marker-end="url(#ar)"/>
  <text x="315" y="180" font-size="8" fill="#ea580c">gap</text>
  <text x="628" y="180" font-size="8" fill="#ea580c">gap</text>
  <defs><marker id="ar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f97316"/></marker></defs>
  <text x="24" y="400" font-size="9" fill="#a1a1aa">Same modules on every unit - no enlarged command cab</text>
</svg>
