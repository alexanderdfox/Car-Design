<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="system-ui, sans-serif">
  <title>Appearance 00 - ant-inspired look key</title>
  <rect width="920" height="400" fill="#fafafa"/>
  <text x="24" y="32" font-size="18" font-weight="600">Formic-1 appearance - ant function, not cosplay</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Source: docs/formic-ant-appearance-prompt.md</text>
  <g transform="translate(24,72)">
    <rect width="420" height="300" fill="#f0fdf4" stroke="#22c55e" rx="8"/>
    <text x="16" y="28" font-size="13" font-weight="600" fill="#166534">SHOW (ant to road)</text>
    <text x="16" y="52" font-size="11" fill="#14532d">Segment: cab | cargo | pack on skid</text>
    <text x="16" y="72" font-size="11" fill="#14532d">Low cab-over stance, 4.2 x 1.8 m</text>
    <text x="16" y="92" font-size="11" fill="#14532d">Antennae: twin black sensor pillars + arc</text>
    <text x="16" y="112" font-size="11" fill="#14532d">Carry: roller door, flat load floor</text>
    <text x="16" y="132" font-size="11" fill="#14532d">Worker: identical units, no royal trim</text>
    <text x="16" y="152" font-size="11" fill="#14532d">Nest: rear CCS, orange bumpers only</text>
    <text x="16" y="172" font-size="11" fill="#14532d">BEV: no exhaust, underbody cassette</text>
    <text x="16" y="192" font-size="11" fill="#14532d">Matte white, #f97316 safety edges</text>
  </g>
  <g transform="translate(460,72)">
    <rect width="420" height="300" fill="#fef2f2" stroke="#ef4444" rx="8"/>
    <text x="16" y="28" font-size="13" font-weight="600" fill="#991b1b">AVOID (negative prompt)</text>
    <text x="16" y="52" font-size="11" fill="#7f1d1d">Bug face, mandibles, legs, wings</text>
    <text x="16" y="72" font-size="11" fill="#7f1d1d">Hex hive grille, glowing brain dome</text>
    <text x="16" y="92" font-size="11" fill="#7f1d1d">Queen limo, gold leader paint</text>
    <text x="16" y="112" font-size="11" fill="#7f1d1d">Swarm-sync LED ring</text>
    <text x="16" y="132" font-size="11" fill="#7f1d1d">Diesel exhaust, ICE grille fiction</text>
    <text x="16" y="152" font-size="11" fill="#7f1d1d">Convoy with lead command truck</text>
    <text x="16" y="172" font-size="11" fill="#7f1d1d">Bee stripes, waggle-dance branding</text>
  </g>
  <text x="24" y="388" font-size="10" fill="#a1a1aa">Assets: appearance-01 .. appearance-08 in assets/appearance/</text>
</svg>
