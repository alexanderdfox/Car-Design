<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 480" font-family="system-ui, sans-serif">
  <title>Appearance 01 - side studio (master prompt)</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ececf0"/><stop offset="100%" stop-color="#d4d4d8"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#e4e4e7"/></linearGradient>
  </defs>
  <rect width="1040" height="480" fill="url(#bg)"/>
  <text x="24" y="30" font-size="17" font-weight="600">Formic-1 - side studio (appearance master prompt)</text>
  <text x="24" y="50" font-size="10" fill="#71717a">Matte white | orange #f97316 | segmented modules | antenna sensor arc | BEV cutaway</text>
  <ellipse cx="420" cy="380" rx="320" ry="24" fill="#0000000a"/>
  <rect x="0" y="360" width="1040" height="120" fill="#9ca3af"/>
  <line x1="60" y1="360" x2="900" y2="360" stroke="#6b7280" stroke-width="2"/>
  <circle cx="220" cy="360" r="36" fill="#27272a"/><circle cx="220" cy="360" r="18" fill="#52525b"/>
  <circle cx="620" cy="360" r="36" fill="#27272a"/><circle cx="620" cy="360" r="18" fill="#52525b"/>
  <!-- skid rail line -->
  <line x1="100" y1="355" x2="820" y2="355" stroke="#a1a1aa" stroke-width="3"/>
  <text x="460" y="350" font-size="8" fill="#71717a">flat skid rails</text>
  <!-- module 1 cab -->
  <path d="M100 240 L100 175 L270 135 L295 240 Z" fill="#d4d4d8" stroke="#18181b" stroke-width="2"/>
  <line x1="295" y1="240" x2="295" y2="360" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="180" y="220" font-size="9" text-anchor="middle" fill="#52525b">cab module</text>
  <!-- module 2 cargo -->
  <rect x="295" y="230" width="380" height="130" fill="url(#body)" stroke="#18181b" stroke-width="2"/>
  <line x1="675" y1="230" x2="675" y2="360" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="620" y="245" width="12" height="100" fill="#f97316"/>
  <text x="485" y="295" font-size="11" text-anchor="middle">cargo box</text>
  <!-- module 3 pack -->
  <rect x="320" y="328" width="340" height="24" fill="#a1a1aa" stroke="#52525b" stroke-width="1.5"/>
  <text x="490" y="322" font-size="9" text-anchor="middle">battery cassette (swap)</text>
  <!-- antennae -->
  <path d="M115 240 L128 100 Q200 75 272 100 L285 240" fill="none" stroke="#f97316" stroke-dasharray="5 4"/>
  <rect x="108" y="92" width="32" height="50" rx="5" fill="#18181b" stroke="#f97316" stroke-width="2"/>
  <rect x="262" y="88" width="32" height="54" rx="5" fill="#18181b" stroke="#f97316" stroke-width="2"/>
  <text x="200" y="82" font-size="10" text-anchor="middle" fill="#3f3f46">sensor antennae</text>
  <!-- deformable zone -->
  <rect x="98" y="280" width="8" height="80" fill="#fecaca" stroke="#ef4444"/>
  <text x="70" y="310" font-size="8" fill="#dc2626" transform="rotate(-90 70 310)">crush zone</text>
  <!-- rear nest -->
  <rect x="98" y="300" width="6" height="60" fill="#f97316"/>
  <rect x="808" y="268" width="16" height="44" rx="2" fill="#f97316"/>
  <rect x="830" y="290" width="4" height="24" fill="#22c55e"/>
  <text x="780" y="258" font-size="9">CCS + charge LED</text>
  <!-- callouts -->
  <g font-size="9" fill="#1e40af">
    <text x="720" y="100">4,200 mm OAL</text>
    <text x="720" y="116">1,850 mm H</text>
    <text x="720" y="132">no exhaust / no ICE grille</text>
  </g>
  <rect x="24" y="420" width="992" height="48" fill="#fff" stroke="#e4e4e7"/>
  <text x="40" y="448" font-size="9" fill="#71717a">NOT insect cosplay | NOT hex hive | NOT queen variant</text>
</svg>
