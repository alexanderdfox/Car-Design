<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="system-ui, sans-serif">
  <title>Formic charging nest plan (40 stalls)</title>
  <rect width="720" height="480" fill="#f4f4f5"/>
  <text x="20" y="28" font-size="16" font-weight="600">Charging nest  40 stalls (schematic)</text>
  <rect x="60" y="60" width="600" height="360" fill="#e4e4e7" stroke="#18181b" stroke-width="2" rx="4"/>
  <text x="280" y="50" font-size="11" fill="#52525b">STREET  street_queue_pheromone spillback</text>
  <rect x="80" y="90" width="560" height="40" fill="#fafafa" stroke="#a1a1aa" stroke-dasharray="4"/>
  <text x="90" y="115" font-size="10">Buffer lane</text>
  <!-- row A stalls -->
  <g id="rowA">
    <text x="80" y="145" font-size="10" fill="#3f3f46">Row A (swap lifts)</text>
  </g>
  <g transform="translate(80,150)">
    <rect width="50" height="70" fill="#fff" stroke="#f97316" x="0" y="0"/><text x="12" y="40" font-size="9">S01</text>
    <rect width="50" height="70" fill="#fff" stroke="#f97316" x="60" y="0"/><text x="72" y="40" font-size="9">S02</text>
    <rect width="50" height="70" fill="#fff" stroke="#f97316" x="120" y="0"/><text x="132" y="40" font-size="9">S03</text>
    <text x="200" y="40" font-size="12" fill="#71717a">& S04S20</text>
  </g>
  <g transform="translate(80,240)">
    <text x="0" y="-5" font-size="10" fill="#3f3f46">Row B</text>
    <rect width="50" height="70" fill="#fff" stroke="#f97316" x="0" y="0"/><text x="10" y="40" font-size="9">S21</text>
    <rect width="50" height="70" fill="#fff" stroke="#f97316" x="60" y="0"/><text x="70" y="40" font-size="9">S22</text>
    <text x="130" y="40" font-size="12" fill="#71717a">& S40</text>
  </g>
  <rect x="80" y="330" width="560" height="50" fill="#d4d4d8" stroke="#71717a"/>
  <text x="90" y="360" font-size="10">CCS overflow + cassette storage</text>
  <text x="90" y="430" font-size="10" fill="#52525b">Trace fields per stall: reserved_until, price_kw, swap_ready</text>
  <text x="90" y="448" font-size="10" fill="#52525b">No central dispatcher  agents read/write map layer</text>
</svg>
