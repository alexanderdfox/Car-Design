<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" font-family="system-ui, sans-serif">
  <title>Formic-1 side view (schematic)</title>
  <rect width="820" height="280" fill="#f4f4f5"/>
  <text x="20" y="28" font-size="16" font-weight="600">Formic-1  side view (schematic, not to scale)</text>
  <!-- ground -->
  <line x1="40" y1="220" x2="780" y2="220" stroke="#71717a" stroke-width="2"/>
  <!-- wheels -->
  <circle cx="200" cy="220" r="32" fill="#3f3f46" stroke="#18181b" stroke-width="2"/>
  <circle cx="520" cy="220" r="32" fill="#3f3f46" stroke="#18181b" stroke-width="2"/>
  <!-- body -->
  <rect x="80" y="120" width="620" height="90" rx="6" fill="#fafafa" stroke="#18181b" stroke-width="2"/>
  <!-- cab -->
  <path d="M 80 120 L 80 90 L 220 70 L 240 120 Z" fill="#e4e4e7" stroke="#18181b" stroke-width="2"/>
  <!-- sensor pods -->
  <rect x="95" y="55" width="28" height="40" rx="4" fill="#27272a" stroke="#f97316" stroke-width="2"/>
  <rect x="195" y="50" width="28" height="45" rx="4" fill="#27272a" stroke="#f97316" stroke-width="2"/>
  <path d="M 109 95 L 120 55 M 209 95 L 209 50" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <text x="100" y="48" font-size="9" fill="#52525b">LiDAR arc</text>
  <!-- cargo door -->
  <rect x="480" y="130" width="8" height="70" fill="#f97316"/>
  <text x="500" y="155" font-size="11" fill="#3f3f46">cargo 4.2 m³</text>
  <!-- battery cassette -->
  <rect x="260" y="205" width="340" height="18" rx="2" fill="#a1a1aa" stroke="#18181b"/>
  <text x="300" y="200" font-size="10" fill="#52525b">battery cassette (swap)</text>
  <!-- bumper accent -->
  <rect x="78" y="195" width="6" height="25" fill="#f97316"/>
  <rect x="690" y="195" width="12" height="25" fill="#f97316"/>
  <text x="650" y="175" font-size="10" fill="#52525b">CCS rear</text>
  <!-- dims -->
  <line x1="80" y1="250" x2="700" y2="250" stroke="#71717a" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="340" y="268" font-size="11" fill="#3f3f46">4,200 mm OAL</text>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#71717a"/>
    </marker>
  </defs>
</svg>
