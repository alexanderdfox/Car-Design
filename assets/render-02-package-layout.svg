<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="system-ui, -apple-system, sans-serif">
  <title>Render 02 - Formic-1 package layout (engineering)</title>
  <desc>Technical top + side labeled diagram. Zones: deformable front, cab, cargo, coupling face, cassette, sensors, swap rails.</desc>
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#52525b"/></marker>
  </defs>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="24" y="32" font-size="18" font-weight="600">Formic-1 - package layout</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Prompt 02 | top + side | dimensions in mm</text>
  <!-- TOP VIEW -->
  <text x="24" y="88" font-size="14" font-weight="600" fill="#3f3f46">Top view</text>
  <g transform="translate(80,100)">
    <rect x="0" y="0" width="420" height="180" fill="none" stroke="#18181b" stroke-width="2"/>
    <!-- zones -->
    <rect x="0" y="0" width="60" height="180" fill="#fecaca" stroke="#18181b"/>
    <text x="8" y="95" font-size="9" transform="rotate(-90 20 95)">deformable F</text>
    <rect x="60" y="0" width="90" height="180" fill="#dbeafe" stroke="#18181b"/>
    <text x="85" y="95" font-size="10" text-anchor="middle">cab L / R</text>
    <rect x="150" y="0" width="200" height="180" fill="#f4f4f5" stroke="#18181b"/>
    <text x="250" y="95" font-size="11" text-anchor="middle">CARGO 4.2 m|</text>
    <rect x="350" y="55" width="70" height="70" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <text x="385" y="98" font-size="8" text-anchor="middle">coupling</text>
    <text x="385" y="110" font-size="8" text-anchor="middle">1,200 mm</text>
    <!-- cassette under -->
    <rect x="90" y="155" width="280" height="20" fill="#a1a1aa" stroke="#18181b"/>
    <text x="230" y="170" font-size="9" text-anchor="middle" fill="#fff">battery cassette 1800|1400</text>
    <!-- sensors top -->
    <circle cx="30" cy="30" r="8" fill="#27272a" stroke="#f97316"/>
    <circle cx="30" cy="150" r="8" fill="#27272a" stroke="#f97316"/>
    <text x="45" y="35" font-size="8">LiDAR</text>
    <rect x="300" y="0" width="50" height="20" fill="#27272a"/>
    <text x="305" y="14" font-size="7" fill="#fff">rear cam</text>
    <!-- dims top -->
    <line x1="0" y1="200" x2="420" y2="200" stroke="#52525b" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="210" y="218" font-size="10" text-anchor="middle">4,200</text>
    <line x1="440" y1="0" x2="440" y2="180" stroke="#52525b" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="458" y="95" font-size="10">1,800</text>
  </g>
  <!-- SIDE VIEW -->
  <text x="24" y="340" font-size="14" font-weight="600" fill="#3f3f46">Side view</text>
  <g transform="translate(80,355)">
    <line x1="0" y1="200" x2="500" y2="200" stroke="#71717a" stroke-width="2"/>
    <rect x="0" y="110" width="420" height="90" fill="#fafafa" stroke="#18181b" stroke-width="2"/>
    <path d="M0 110 L0 70 L100 45 L120 110 Z" fill="#e4e4e7" stroke="#18181b"/>
    <rect x="20" y="50" width="24" height="35" rx="3" fill="#27272a" stroke="#f97316"/>
    <rect x="95" y="45" width="24" height="40" rx="3" fill="#27272a" stroke="#f97316"/>
    <rect x="300" y="185" width="380" height="18" fill="#a1a1aa" stroke="#18181b"/>
    <text x="200" y="178" font-size="9" text-anchor="middle">swap rails / cassette 220 mm H</text>
    <text x="250" y="140" font-size="10" text-anchor="middle">cargo floor 650 mm | max load H 1,400</text>
    <line x1="0" y1="230" x2="420" y2="230" stroke="#52525b" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="210" y="248" font-size="10" text-anchor="middle">4,200</text>
    <line x1="460" y1="110" x2="460" y2="200" stroke="#52525b" marker-start="url(#a)" marker-end="url(#a)"/>
    <text x="478" y="160" font-size="10">1,850</text>
    <line x1="120" y1="200" x2="380" y2="200" stroke="#f97316" stroke-dasharray="4 3"/>
    <text x="250" y="218" font-size="9" text-anchor="middle" fill="#ea580c">wheelbase 2,700</text>
  </g>
  <!-- legend -->
  <g transform="translate(560,100)">
    <text x="0" y="0" font-size="12" font-weight="600">Zone key</text>
    <rect x="0" y="12" width="14" height="14" fill="#fecaca"/><text x="22" y="24" font-size="10">Deformable front (300 mm)</text>
    <rect x="0" y="32" width="14" height="14" fill="#dbeafe"/><text x="22" y="44" font-size="10">Cab module (swappable)</text>
    <rect x="0" y="52" width="14" height="14" fill="#f4f4f5" stroke="#18181b"/><text x="22" y="64" font-size="10">Cargo 2,200 | 1,650 | 1,400 mm</text>
    <rect x="0" y="72" width="14" height="14" fill="#ffedd5" stroke="#f97316"/><text x="22" y="84" font-size="10">Coupling face (peer dock)</text>
    <rect x="0" y="92" width="14" height="14" fill="#a1a1aa"/><text x="22" y="104" font-size="10">Battery cassette under floor</text>
    <rect x="0" y="112" width="14" height="14" fill="#27272a"/><text x="22" y="124" font-size="10">LiDAR / cameras / UWB</text>
  </g>
  <text x="24" y="600" font-size="9" fill="#a1a1aa">Excluded: hex-hive branding, central fleet brain, queen module</text>
</svg>
