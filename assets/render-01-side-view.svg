<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="system-ui, -apple-system, sans-serif">
  <title>Render 01 - Formic-1 side view (studio schematic)</title>
  <desc>Master: Formic-1 BEV ant-colony logistics van. Scene: side view, cutaway cassette, sensor arc, CCS rear. Negative: no hive brain, queen, hex branding.</desc>
  <defs>
    <linearGradient id="studioBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8ec"/>
      <stop offset="55%" stop-color="#f8f8fa"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e4e4e7"/>
    </linearGradient>
    <marker id="dimArrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#52525b"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="url(#studioBg)"/>
  <ellipse cx="480" cy="340" rx="360" ry="28" fill="#00000008"/>
  <text x="24" y="32" font-size="18" font-weight="600" fill="#18181b">Formic-1 - side view render</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Prompt 01 | matte white | orange accents | cutaway pack | no hive aesthetic</text>
  <rect x="0" y="318" width="960" height="102" fill="#a1a1aa"/>
  <line x1="40" y1="318" x2="920" y2="318" stroke="#71717a" stroke-width="2"/>
  <circle cx="240" cy="318" r="38" fill="#27272a" stroke="#18181b" stroke-width="2"/>
  <circle cx="240" cy="318" r="20" fill="#52525b"/>
  <circle cx="600" cy="318" r="38" fill="#27272a" stroke="#18181b" stroke-width="2"/>
  <circle cx="600" cy="318" r="20" fill="#52525b"/>
  <rect x="100" y="200" width="700" height="118" rx="8" fill="url(#bodyGrad)" stroke="#18181b" stroke-width="2"/>
  <path d="M100 200 L100 155 L280 118 L310 200 Z" fill="#d4d4d8" stroke="#18181b" stroke-width="2"/>
  <rect x="118" y="168" width="90" height="52" rx="4" fill="#93c5fd33" stroke="#3b82f6" stroke-width="1"/>
  <text x="128" y="198" font-size="9" fill="#1e40af">cab module</text>
  <path d="M130 200 L145 95 Q200 70 255 95 L270 200" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="118" y="88" width="34" height="48" rx="6" fill="#27272a" stroke="#f97316" stroke-width="2"/>
  <rect x="248" y="82" width="34" height="54" rx="6" fill="#27272a" stroke="#f97316" stroke-width="2"/>
  <text x="155" y="78" font-size="10" fill="#52525b">LiDAR + camera arc</text>
  <line x1="320" y1="200" x2="320" y2="318" stroke="#a1a1aa" stroke-width="1"/>
  <rect x="560" y="210" width="10" height="98" fill="#f97316"/>
  <text x="400" y="250" font-size="12" fill="#3f3f46">cargo 4.2 m3</text>
  <path d="M280 318 L280 298 L720 298 L720 318 Z" fill="#71717a" stroke="#18181b"/>
  <rect x="300" y="288" width="400" height="22" rx="3" fill="#a1a1aa" stroke="#18181b" stroke-width="1.5"/>
  <text x="380" y="282" font-size="10" fill="#18181b">battery cassette (swap) - cutaway</text>
  <rect x="788" y="248" width="14" height="40" rx="2" fill="#f97316"/>
  <text x="720" y="238" font-size="10" fill="#52525b">CCS rear</text>
  <rect x="98" y="290" width="8" height="28" fill="#f97316"/>
  <rect x="794" y="290" width="8" height="28" fill="#f97316"/>
  <line x1="100" y1="368" x2="800" y2="368" stroke="#52525b" marker-start="url(#dimArrow)" marker-end="url(#dimArrow)"/>
  <text x="400" y="392" font-size="12" fill="#18181b" text-anchor="middle">4,200 mm OAL | 1,850 mm H | wheelbase 2,700 mm</text>
  <rect x="24" y="400" width="912" height="1" fill="#e4e4e7"/>
  <text x="24" y="414" font-size="9" fill="#a1a1aa">Excluded: queen vehicle, hex hive branding, fleet brain core, diesel exhaust</text>
</svg>
