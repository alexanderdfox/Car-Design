<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" font-family="system-ui, -apple-system, sans-serif">
  <title>Render 03 - Peer battery dock storyboard</title>
  <desc>Three-panel: two Formic-1 vans, coupling faces aligned, cassette transfer. No lead truck or overseer.</desc>
  <rect width="1100" height="380" fill="#f4f4f5"/>
  <text x="24" y="32" font-size="18" font-weight="600">Peer dock - battery cassette transfer</text>
  <text x="24" y="52" font-size="11" fill="#71717a">Prompt 03 | local DOCK_OFFER / DOCK_ACCEPT only | no supervisor vehicle</text>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#18181b"/></marker>
    <g id="vanSide">
      <rect x="0" y="40" width="140" height="55" rx="4" fill="#fafafa" stroke="#18181b" stroke-width="1.5"/>
      <path d="M0 40 L0 22 L35 12 L45 40 Z" fill="#e4e4e7" stroke="#18181b"/>
      <circle cx="35" cy="95" r="14" fill="#3f3f46"/>
      <circle cx="105" cy="95" r="14" fill="#3f3f46"/>
      <rect x="0" y="78" width="4" height="12" fill="#f97316"/>
    </g>
  </defs>
  <!-- Panel 1 -->
  <g transform="translate(40,70)">
    <rect x="0" y="0" width="320" height="260" fill="#fff" stroke="#d4d4d8" rx="6"/>
    <text x="160" y="24" font-size="12" font-weight="600" text-anchor="middle">1 - Align</text>
    <line x1="20" y1="220" x2="300" y2="220" stroke="#a1a1aa"/>
    <use href="#vanSide" x="30" y="80"/>
    <use href="#vanSide" x="150" y="80" transform="scale(-1,1) translate(-290,0)"/>
    <rect x="148" y="115" width="24" height="40" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="160" y="200" font-size="9" text-anchor="middle" fill="#52525b">UWB &lt; 3 m | speed 0</text>
    <text x="160" y="240" font-size="9" text-anchor="middle" fill="#16a34a">DOCK_OFFER | ACCEPT</text>
  </g>
  <!-- Panel 2 -->
  <g transform="translate(380,70)">
    <rect x="0" y="0" width="320" height="260" fill="#fff" stroke="#d4d4d8" rx="6"/>
    <text x="160" y="24" font-size="12" font-weight="600" text-anchor="middle">2 - Couple + eject</text>
    <line x1="20" y1="220" x2="300" y2="220" stroke="#a1a1aa"/>
    <use href="#vanSide" x="30" y="80"/>
    <use href="#vanSide" x="150" y="80" transform="scale(-1,1) translate(-290,0)"/>
    <rect x="118" y="168" width="84" height="12" fill="#a1a1aa" stroke="#18181b"/>
    <rect x="130" y="168" width="40" height="12" fill="#f97316"/>
    <path d="M170 174 L200 174" stroke="#18181b" marker-end="url(#arr)"/>
    <text x="160" y="200" font-size="9" text-anchor="middle">Donor ejects cassette 30%</text>
    <text x="160" y="240" font-size="9" text-anchor="middle">Coupling face interlock closed</text>
  </g>
  <!-- Panel 3 -->
  <g transform="translate(720,70)">
    <rect x="0" y="0" width="320" height="260" fill="#fff" stroke="#d4d4d8" rx="6"/>
    <text x="160" y="24" font-size="12" font-weight="600" text-anchor="middle">3 - Complete</text>
    <line x1="20" y1="220" x2="300" y2="220" stroke="#a1a1aa"/>
    <use href="#vanSide" x="30" y="80"/>
    <use href="#vanSide" x="150" y="80" transform="scale(-1,1) translate(-290,0)"/>
    <rect x="145" y="168" width="70" height="12" fill="#a1a1aa" stroke="#18181b"/>
    <text x="160" y="200" font-size="9" text-anchor="middle">Receiver pulls pack | faces disengage</text>
    <text x="160" y="240" font-size="9" text-anchor="middle">Each writes pack_id + nest trace if needed</text>
  </g>
  <text x="24" y="368" font-size="9" fill="#a1a1aa">Forbidden: third supervisor car, cloud-triggered pair swap, queen lead truck</text>
</svg>
